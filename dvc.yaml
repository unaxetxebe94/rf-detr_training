stages:
  preprocess:
    cmd: conda run -n rf-detr python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/${task-name}/train/_annotations.coco.json

  train:
    cmd: conda run -n rf-detr python src/train.py
    deps:
      - src/train.py
      - data/${task-name}/train
      - params.yaml
    params:
      - train
      - task-name
      - model-type
      - seed
    outs:
      - trainings/${task-name}:  # Carpeta de salida
          cache: true
      - trainings/temp/results.json

  test:
    cmd: conda run -n rf-detr python src/test.py
    deps:
      - src/test.py
      - trainings/${task-name}
      - data/temp/category_map.json
      - trainings/temp/run_info.json
    params:
      - task-name