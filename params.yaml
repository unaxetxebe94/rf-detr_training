task-name: prueba
model-type: nano
seed: 42

preprocess:
  resize: 1.0
  apply-roi: false
  train-ratio: 0.7
  test-ratio: 0.15
  val-ratio: 0.15
  augmentations-per-image: 2
  max-transforms-per-sample: 5

train:
  lr: 0.0001
  lr_encoder: 0.00015
  batch_size: 4
  grad_accum_steps: 2
  epochs: 3
  weight_decay: 1e-4
  tensorboard: true
  wandb: true
  project: rf-detr
  mlflow: true
  clearml: false
  run_test: true
  eval_max_dets: 500
