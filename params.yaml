task-name: damage-detection
model-type: nano
seed: 42

preprocess:
  resize: 1
  apply-roi: false

train:
  lr: 0.0001
  lr_encoder: 0.00015
  batch_size: 16
  grad_accum_steps: 2
  epochs: 3
  weight_decay: 1e-4
  tensorboard: true
  wandb: true
  project: rf-detr
  mlflow: true
  clearml: false
  run_test: true
  eval_max_dets: 500
